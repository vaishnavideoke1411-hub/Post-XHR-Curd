<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-6" offset-md-3>
                <div class="card">
                    <div class="card-body">
                        <form action="" id="inputForm">
                            <div class="form-group">
                                <label for="title" class="font-weight-bold">TITLE</label>
                                <input type="text" class="form-control" id="title">
                            </div>

                            <div class="form-group">
                                <label for="title" class="font-weight-bold">BODY</label>
                                <textarea name="" id="body" class="form-control"></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label for="uuserId" class="font-weight-bold">USERID</label>
                                <select id="userId" class="form-control">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </div>

                            <button class="btn btn-sm btn-block btn-outline-info" 
                                id="AddObj">
                                Add Data
                            </button>

                            <button class="btn btn-sm btn-block btn-outline-danger d-none" 
                                    id="UpdateObj">
                                    Update Data
                            </button>

                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-5" id="cardContainer">
